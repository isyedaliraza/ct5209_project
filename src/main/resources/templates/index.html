<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h2>All Petitions</h2>

    <div th:if="${#lists.isEmpty(petitions)}" class="alert alert-warning">
        No petitions available yet.
    </div>

    <div class="row g-3">

        <div class="col-md-6 col-lg-4"
             th:each="petition : ${petitions}">

            <div class="card shadow-sm h-100">

                <div class="card-body d-flex flex-column">

                    <h5 class="card-title"
                        th:text="${petition.title}">
                    </h5>

                    <p class="card-text text-muted"
                       th:text="${#strings.abbreviate(petition.description, 120)}">
                    </p>

                    <div class="mt-auto"></div>

                    <a class="btn btn-outline-primary w-100"
                       th:href="@{'/petition/' + ${petition.id}}">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
